; =============================================================================
;  PlatformIO project — ESP32-WROOM-32 DevKit V1 companion firmware
;  OPTIONAL status display for the rtl-sdr-channel-detector server.
;
;  The ESP32 is a *status display only*. It does NOT receive or analyze RF.
;  It polls the server REST API (/api/health, /api/device, /api/config,
;  /api/channels) over Wi-Fi and shows a summary over Serial and a small
;  built-in web page. See README.md.
; =============================================================================

[env:esp32dev]
; board = esp32dev is the generic ESP32 Dev Module and is fully compatible
; with the ESP32-WROOM-32 DevKit V1 (the common 30/38-pin dev board).
platform  = espressif32
board     = esp32dev
framework  = arduino

; --- Serial monitor -----------------------------------------------------------
monitor_speed = 115200
; Decode stack traces, prepend timestamps, colorize log levels.
monitor_filters =
    esp32_exception_decoder
    time
    colorize

; NOTE: upload_port / monitor_port are intentionally NOT hard-coded so the
;       toolchain auto-detects the board. If auto-detection fails, pass it on
;       the command line, e.g.:
;         pio run -t upload --upload-port /dev/ttyUSB0     (Linux)
;         pio run -t upload --upload-port /dev/cu.SLAB_USBtoUART   (macOS)
;         pio run -t upload --upload-port COM5             (Windows)
;       See README.md for how to find your port on each OS.
; upload_port  = /dev/ttyUSB0
; monitor_port = /dev/ttyUSB0

; --- Library dependencies (pinned) -------------------------------------------
; ArduinoJson v7 is used for all JSON parsing/serialization.
; WebSockets (by Markus Sattler) is pinned for the OPTIONAL /ws/live path;
; the shipped firmware uses REST polling and does not require it at runtime,
; but it is pinned so a WebSocket build stays reproducible.
; WiFi.h, WebServer.h, HTTPClient.h, DNSServer.h and Preferences.h are part of
; the ESP32 Arduino core (built-in) and need no lib_deps entry.
lib_deps =
    bblanchon/ArduinoJson @ ^7.2.1
    links2004/WebSockets @ ^2.6.1

; --- Build flags --------------------------------------------------------------
build_flags =
    -D CORE_DEBUG_LEVEL=2
    ; Uncomment to build in MOCK_MODE: fabricates plausible SDR data so the
    ; firmware runs and the web UI/serial output are populated with NO server.
    ; -D MOCK_MODE=1
    ;
    ; Example: override the default server target at compile time instead of
    ; using include/secrets.h or the captive portal:
    ; -D SERVER_HOST_DEFAULT='"192.168.1.50"'
    ; -D SERVER_PORT_DEFAULT=8080
    ;
    ; Example: point the REST client at the WebSocket path instead (future):
    ; -D FEATURE_WEBSOCKET=1
